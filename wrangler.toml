# Rep · single config · Worker API + D1 + static assets on rep.anirudhgoel.xyz
# Dev: npm run dev · Deploy: npm run deploy · DB: npm run db:remote

name = "rep"
main = "src/worker.js"
compatibility_date = "2026-05-20"
workers_dev = true
preview_urls = true

[assets]
directory = "./"
not_found_handling = "404-page"
binding = "ASSETS"
# worker must see artist pages to inject per-artist OG/meta before assets serve them
run_worker_first = ["/artist", "/artist.html"]

[vars]
TURNSTILE_ENFORCE = "1"

[[d1_databases]]
binding = "DB"
database_name = "rep-db"
database_id = "114f992a-2099-4a0c-a3a5-011b15638c46"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "rep-media"

[[routes]]
pattern = "rep.anirudhgoel.xyz"
custom_domain = true

[observability]
enabled = true
