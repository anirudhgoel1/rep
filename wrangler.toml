# Rep · single config · Worker API + D1 + static assets on rep.anirudhgoel.xyz
# Dev: npm run dev · Deploy: npm run deploy · DB: npm run db:remote

name = "rep"
main = "src/worker.js"
compatibility_date = "2026-05-20"
workers_dev = true
preview_urls = true

[assets]
directory = "./"
not_found_handling = "404-page"
binding = "ASSETS"
# Worker must run first for all dynamic routes. With not_found_handling="404-page"
# + a 404.html present, the assets layer otherwise serves 404.html for every
# non-asset path (incl. /api/*) and never invokes the Worker. These globs route
# API, media, ballot pages and artist OG injection to the Worker before assets.
run_worker_first = ["/api/*", "/img/*", "/cards/*", "/l/*", "/artist", "/artist.html"]

[vars]
TURNSTILE_ENFORCE = "1"

[[d1_databases]]
binding = "DB"
database_name = "rep-db"
database_id = "114f992a-2099-4a0c-a3a5-011b15638c46"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "rep-media"

[[routes]]
pattern = "rep.anirudhgoel.xyz"
custom_domain = true

[observability]
enabled = true
